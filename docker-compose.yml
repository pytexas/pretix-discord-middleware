services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

  temporal:
    build:
      context: .
      dockerfile: temporal.Dockerfile
    env_file: .env
    command:
      - --tailscale-hostname=${TS_HOSTNAME:-temporal-dev}
      - --ip=0.0.0.0
      - --db-filename=/data/temporal.db
    ports:
      - "127.0.0.1:7233:7233"
      - "127.0.0.1:8233:8233"
    volumes:
      - temporal_data:/data
      - temporal_tsstate:/var/lib/tailscale
    restart: unless-stopped

  worker:
    build: .
    command: python -m pretix_discord.worker
    env_file: .env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    restart: unless-stopped

  web:
    build: .
    command: python -m pretix_discord.main
    expose:
      - "8000"
    env_file: .env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  temporal_data:
  temporal_tsstate:
