# The `caddy` and `temporal` services are gated behind the `standalone` profile so this
# compose file is fully self-contained for local development (`docker compose --profile
# standalone up`) but in shared deployments the substrate is provided externally and
# only `worker` and `web` start (`docker compose up`).

services:
  caddy:
    image: caddy:2
    profiles: ["standalone"]
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

  temporal:
    build:
      context: .
      dockerfile: temporal.Dockerfile
    profiles: ["standalone"]
    env_file: .env
    command:
      - --tailscale-hostname=${TS_HOSTNAME:-temporal-dev}
      - --ip=0.0.0.0
      - --db-filename=/data/temporal.db
    ports:
      - "127.0.0.1:7233:7233"
      - "127.0.0.1:8233:8233"
    volumes:
      - temporal_data:/data
      - temporal_tsstate:/var/lib/tailscale
    restart: unless-stopped

  # NB: no depends_on temporal -- in shared deployments temporal lives in another compose
  # project, and the Temporal Python client retries on connect anyway, so explicit
  # depends_on adds no value and would interact awkwardly with profile-gated services.
  worker:
    build: .
    command: python -m pretix_discord.worker
    env_file: .env
    environment:
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      # Real-time docker logs (Python defaults to 8KB stdout buffering).
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped

  web:
    build: .
    command: python -m pretix_discord.main
    expose:
      - "8000"
    env_file: .env
    environment:
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  temporal_data:
  temporal_tsstate:
